services:
  catalog-api:
    build:
      context: .
      dockerfile: services/catalog/Catalog.Api/Dockerfile
    container_name: catalog-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=catalog-db;Port=5432;Database=catalog_db;Username=postgres;Password=postgres
    ports:
      - "5001:8080"
    depends_on:
      catalog-db:
        condition: service_healthy

  ordering-api:
    build:
      context: .
      dockerfile: services/ordering/Ordering.Api/Dockerfile
    container_name: ordering-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=ordering-db;Port=5432;Database=ordering_db;Username=postgres;Password=postgres
      CatalogApi__BaseUrl: http://catalog-api:8080
      InventoryApi__BaseUrl: http://inventory-api:8080
    ports:
      - "5002:8080"
    depends_on:
      ordering-db:
        condition: service_healthy
      catalog-api:
        condition: service_started
      inventory-api:
        condition: service_started

  inventory-api:
    build:
      context: .
      dockerfile: services/inventory/Inventory.Api/Dockerfile
    container_name: inventory-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=inventory-db;Port=5432;Database=inventory_db;Username=postgres;Password=postgres
    ports:
      - "5003:8080"
    depends_on:
      inventory-db:
        condition: service_healthy

  payment-api:
    build:
      context: .
      dockerfile: services/payment/Payment.Api/Dockerfile
    container_name: payment-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=payment-db;Port=5432;Database=payment_db;Username=postgres;Password=postgres
      OrderingApi__BaseUrl: http://ordering-api:8080
    ports:
      - "5004:8080"
    depends_on:
      payment-db:
        condition: service_healthy
      ordering-api:
        condition: service_started

  catalog-db:
    image: postgres:16-alpine
    container_name: catalog-db
    environment:
      POSTGRES_DB: catalog_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d catalog_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ordering-db:
    image: postgres:16-alpine
    container_name: ordering-db
    environment:
      POSTGRES_DB: ordering_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ordering-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordering_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-db:
    image: postgres:16-alpine
    container_name: payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  catalog-db-data:
  ordering-db-data:
  inventory-db-data:
  payment-db-data: