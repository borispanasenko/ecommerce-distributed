openapi: 3.0.3
info:
  title: Fulfillment Service API
  description: API for managing order shipments, carrier assignments, and status tracking.
  version: 1.0.0
servers:
  - url: http://localhost:5006
    description: .NET Fulfillment Service Local Server
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - service
                  - status
                  - timestamp
                properties:
                  service:
                    type: string
                    example: Fulfillment
                  status:
                    type: string
                    example: OK
                  timestamp:
                    type: string
                    format: date-time

  /api/shipments:
    get:
      tags:
        - Shipments
      summary: List all shipments
      operationId: getShipments
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShipmentListItemDto'
    post:
      tags:
        - Shipments
      summary: Create a new shipment (Pending state)
      operationId: createShipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShipmentRequest'
      responses:
        '201':
          description: Shipment created successfully
          headers:
            Location:
              schema:
                type: string
              description: URL of the created shipment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentDetailsDto'
        '400':
          description: Order ID required / Order not paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/shipments/{shipmentId}:
    get:
      tags:
        - Shipments
      summary: Get shipment details by ID
      operationId: getShipmentById
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentDetailsDto'
        '404':
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/shipments/{shipmentId}/ship:
    post:
      tags:
        - Shipments
      summary: Mark shipment as Shipped
      description: Notifies Ordering service order is Shipped
      operationId: shipShipment
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipShipmentRequest'
      responses:
        '200':
          description: Shipment marked as shipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentDetailsDto'
        '400':
          description: Shipment not pending / Ordering service notify failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/shipments/{shipmentId}/cancel:
    post:
      tags:
        - Shipments
      summary: Cancel a pending shipment
      operationId: cancelShipment
      parameters:
        - name: shipmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Shipment cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipmentDetailsDto'
        '400':
          description: Shipment not pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Shipment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreateShipmentRequest:
      type: object
      required:
        - orderId
      properties:
        orderId:
          type: string
          format: uuid
        carrier:
          type: string
          nullable: true
        trackingNumber:
          type: string
          nullable: true

    ShipShipmentRequest:
      type: object
      properties:
        carrier:
          type: string
          nullable: true
        trackingNumber:
          type: string
          nullable: true

    ShipmentListItemDto:
      type: object
      required:
        - id
        - orderId
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        status:
          type: string
        carrier:
          type: string
          nullable: true
        trackingNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        shippedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true

    ShipmentDetailsDto:
      type: object
      required:
        - id
        - orderId
        - status
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        status:
          type: string
        carrier:
          type: string
          nullable: true
        trackingNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        shippedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
