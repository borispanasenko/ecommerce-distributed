openapi: 3.0.3
info:
  title: Ordering Service API
  description: API for managing orders, order items, and order status lifecycle.
  version: 1.0.0
servers:
  - url: http://localhost:5002
    description: .NET Ordering Service Local Server
paths:
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - service
                  - status
                  - timestamp
                properties:
                  service:
                    type: string
                    example: Ordering
                  status:
                    type: string
                    example: OK
                  timestamp:
                    type: string
                    format: date-time

  /api/orders:
    get:
      tags:
        - Orders
      summary: List all orders
      operationId: getOrders
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderListItemDto'
    post:
      tags:
        - Orders
      summary: Create a new order and allocate stock
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created successfully
          headers:
            Location:
              schema:
                type: string
              description: URL of the created order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailsDto'
        '400':
          description: Invalid input / Allocation failed / Out of stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get order details by ID
      operationId: getOrderById
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailsDto'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{orderId}/cancel:
    post:
      tags:
        - Orders
      summary: Cancel a pending payment order and release stock
      operationId: cancelOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailsDto'
        '400':
          description: Order cannot be cancelled / Invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{orderId}/expire:
    post:
      tags:
        - Orders
      summary: Expire a pending payment order and release stock
      operationId: expireOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order expired successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailsDto'
        '400':
          description: Order cannot be expired / Invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{orderId}/mark-paid:
    post:
      tags:
        - Orders
      summary: Mark an order as Paid
      operationId: markOrderPaid
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order marked paid successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailsDto'
        '400':
          description: Order cannot be marked paid / Invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/orders/{orderId}/mark-shipped:
    post:
      tags:
        - Orders
      summary: Mark an order as Shipped and commit stock reservation
      operationId: markOrderShipped
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Order marked shipped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailsDto'
        '400':
          description: Order cannot be marked shipped / Commit failed / Invalid state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreateOrderRequest:
      type: object
      required:
        - customerName
        - customerEmail
        - items
      properties:
        customerName:
          type: string
        customerEmail:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'

    CreateOrderItemRequest:
      type: object
      required:
        - productVariantId
        - quantity
      properties:
        productVariantId:
          type: string
          format: uuid
        quantity:
          type: integer

    OrderListItemDto:
      type: object
      required:
        - id
        - customerName
        - customerEmail
        - status
        - totalAmountMinor
        - currency
        - itemCount
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        customerName:
          type: string
        customerEmail:
          type: string
        status:
          type: string
        totalAmountMinor:
          type: integer
          format: int64
        currency:
          type: string
        itemCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    OrderDetailsDto:
      type: object
      required:
        - id
        - customerName
        - customerEmail
        - status
        - totalAmountMinor
        - currency
        - createdAt
        - updatedAt
        - items
      properties:
        id:
          type: string
          format: uuid
        customerName:
          type: string
        customerEmail:
          type: string
        status:
          type: string
        totalAmountMinor:
          type: integer
          format: int64
        currency:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemDto'

    OrderItemDto:
      type: object
      required:
        - id
        - productId
        - productVariantId
        - sku
        - productName
        - variantName
        - unitPriceAmountMinor
        - currency
        - quantity
        - lineTotalAmountMinor
      properties:
        id:
          type: string
          format: uuid
        productId:
          type: string
          format: uuid
        productVariantId:
          type: string
          format: uuid
        sku:
          type: string
        productName:
          type: string
        variantName:
          type: string
        unitPriceAmountMinor:
          type: integer
          format: int64
        currency:
          type: string
        quantity:
          type: integer
        lineTotalAmountMinor:
          type: integer
          format: int64
        inventoryReservationId:
          type: string
          format: uuid
          nullable: true

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
